concurrency:
  cancel-in-progress: false
  group: 'pages'
jobs:
  pages:
    environment:
      name: 'github-pages'
      url: '${{ steps.deployment.outputs.page_url }}'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0'
        with:
          persist-credentials: false
      - name: 'Setup Pages'
        uses: 'actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d'
      - name: 'Install Doxygen and Graphviz'
        run: 'sudo apt-get update && sudo apt-get install --no-install-recommends -y doxygen graphviz'
      - name: 'Configure'
        run: 'cmake -S . -B build -DBUILD_DOCS=ON'
      - name: 'Build documentation'
        run: 'cmake --build build --target docs'
      # Inline equivalent of actions/upload-pages-artifact: that action pulls in
      # actions/upload-artifact by tag, which this repo's SHA-pinning policy rejects.
      - name: 'Archive documentation for Pages'
        run: 'tar --dereference --hard-dereference -cvf "${RUNNER_TEMP}/artifact.tar" -C build/html --exclude=.git --exclude=.github .'
      - name: 'Upload Pages artifact'
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a'
        with:
          if-no-files-found: 'error'
          name: 'github-pages'
          path: '${{ runner.temp }}/artifact.tar'
          retention-days: '1'
      - id: 'deployment'
        name: 'Deploy to GitHub Pages'
        uses: 'actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128'
name: 'GitHub Pages'
'on':
  push:
    branches:
      - 'master'
permissions:
  contents: 'read'
  id-token: 'write'
  pages: 'write'
