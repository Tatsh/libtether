concurrency:
  cancel-in-progress: false
  group: 'pages'
jobs:
  pages:
    environment:
      name: 'github-pages'
      url: '${{ steps.deployment.outputs.page_url }}'
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10'
        with:
          persist-credentials: false
      - name: 'Setup Pages'
        uses: 'actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b'
      - name: 'Install Doxygen and Graphviz'
        run: 'sudo apt-get update && sudo apt-get install --no-install-recommends -y doxygen graphviz'
      - name: 'Configure'
        run: 'cmake -S . -B build -DBUILD_DOCS=ON'
      - name: 'Build documentation'
        run: 'cmake --build build --target docs'
      # Inline equivalent of actions/upload-pages-artifact: that action pulls in
      # actions/upload-artifact by tag, which this repo's SHA-pinning policy rejects.
      - name: 'Archive documentation for Pages'
        run: 'tar --dereference --hard-dereference -cvf "${RUNNER_TEMP}/artifact.tar" -C build/html --exclude=.git --exclude=.github .'
      - name: 'Upload Pages artifact'
        uses: 'actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02'
        with:
          if-no-files-found: 'error'
          name: 'github-pages'
          path: '${{ runner.temp }}/artifact.tar'
          retention-days: '1'
      - id: 'deployment'
        name: 'Deploy to GitHub Pages'
        uses: 'actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e'
name: 'GitHub Pages'
'on':
  push:
    branches:
      - 'master'
permissions:
  contents: 'read'
  id-token: 'write'
  pages: 'write'
